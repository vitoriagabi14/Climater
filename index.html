<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClimaLook — Seu Look do Dia</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="bg-layer"></div>

<div class="app">

  <header class="app-header">
    <div class="logo">🌤 ClimaLook</div>
    <p class="tagline">Vista-se certo para o dia certo</p>
  </header>

  <div class="search-card">
    <div class="search-row">
      <input type="text" id="cidade" placeholder="Buscar cidade..." autocomplete="off">
      <button class="btn-buscar" onclick="buscarClima()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
    <button class="btn-loc" onclick="usarLocalizacao()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 1 7 7c0 5.25-7 13-7 13S5 14.25 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      Usar minha localização
    </button>
  </div>

  <div id="resultado" class="resultado hidden">

    <div class="weather-card">
      <div class="weather-top">
        <div>
          <h2 id="local"></h2>
          <p class="weather-desc" id="descricao"></p>
        </div>
        <div class="temp-badge">
          <span id="temperatura"></span>
          <span class="grau">°C</span>
        </div>
      </div>
      <div class="weather-meta">
        <div class="meta-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v6m0 12v2M4.93 4.93l4.24 4.24m5.66 5.66 4.24 4.24M2 12h6m12 0h2M4.93 19.07l4.24-4.24m5.66-5.66 4.24-4.24"/></svg>
          Sensação <span id="sensacao"></span>°C
        </div>
        <div class="meta-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
          Umidade <span id="umidade"></span>%
        </div>
        <div class="meta-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>
          Vento <span id="vento"></span> km/h
        </div>
      </div>
    </div>

    <div class="look-card">
      <div class="look-header">
        <span class="look-label">Look recomendado</span>
        <img id="imagemRoupa" alt="roupa">
      </div>
      <p id="dica" class="dica-texto"></p>
    </div>

    <div class="checklist-card">
      <h3 class="checklist-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Checklist para sair de casa
      </h3>
      <ul id="checklist" class="checklist"></ul>
    </div>

    <a id="comprar" target="_blank" class="btn-comprar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      Comprar roupas na Shopee
    </a>

  </div>

  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <p>Buscando clima...</p>
  </div>

  <div id="erro" class="erro hidden">
    <p>❌ Cidade não encontrada. Tente novamente.</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
